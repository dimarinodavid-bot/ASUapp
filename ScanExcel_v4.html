<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d0d">
<title>ScanExcel</title>
<style>
:root{--bg:#0d0d0d;--s:#161616;--s2:#1e1e1e;--b:#282828;
  --g:#00e676;--r:#ff5252;--a:#ffab40;--t:#f2f2f2;--m:#5a5a5a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t);font-family:system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column}

header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  background:var(--s);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:200}
.logo{font-family:monospace;font-size:19px;font-weight:700}
.logo b{color:var(--g)}
.badge{font-family:monospace;font-size:12px;background:var(--s2);
  border:1px solid var(--b);padding:4px 12px;border-radius:20px;color:var(--m)}
.badge span{color:var(--g);font-weight:700}

/* CAMERA */
.cam-wrap{position:relative;background:#000;width:100%;overflow:hidden;
  height:56vw;max-height:280px;flex-shrink:0}
#vid{width:100%;height:100%;object-fit:cover;display:block}

.cam-overlay{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  background:rgba(0,0,0,.85);padding:16px}
.cam-overlay.hidden{display:none}

.overlay-icon{font-size:44px;opacity:.6}
.overlay-msg{font-size:13px;text-align:center;color:var(--t);line-height:1.7;max-width:240px}
.overlay-msg b{color:var(--g)}

/* Frame */
.frame-guide{position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;pointer-events:none}
.frame-guide.on{display:flex}
.fb{width:min(260px,74%);height:min(150px,42%);position:relative}
.fb::before,.fb::after,.fb .c3,.fb .c4{content:'';position:absolute;
  width:22px;height:22px;border-color:var(--g);border-style:solid}
.fb::before{top:0;left:0;border-width:3px 0 0 3px}
.fb::after{top:0;right:0;border-width:3px 3px 0 0}
.fb .c3{bottom:0;right:0;border-width:0 3px 3px 0}
.fb .c4{bottom:0;left:0;border-width:0 0 3px 3px}
.sl{position:absolute;left:4px;right:4px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,230,118,.8),transparent);
  box-shadow:0 0 8px var(--g);animation:sc 2s ease-in-out infinite}
@keyframes sc{0%,100%{top:6%}50%{top:88%}}

.cam-status{position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.65);padding:5px 10px;
  font-family:monospace;font-size:10px;color:var(--g);
  letter-spacing:1px;text-align:center;text-transform:uppercase}

.flash{position:fixed;inset:0;background:var(--g);opacity:0;
  pointer-events:none;z-index:500;transition:opacity .05s}
.flash.on{opacity:.28}

/* DEBUG BOX */
.debug{margin:8px 14px;background:#0a1a10;border:1px solid #1a4a2a;
  border-radius:8px;padding:10px 12px;font-family:monospace;
  font-size:11px;color:#4daa70;line-height:1.8;display:none}
.debug.on{display:block}
.debug .step{display:flex;align-items:center;gap:6px}
.debug .ok{color:var(--g)}
.debug .fail{color:var(--r)}
.debug .wait{color:var(--a)}

/* ERROR */
.err-box{display:none;margin:8px 14px;background:rgba(255,82,82,.1);
  border:1px solid rgba(255,82,82,.3);border-radius:10px;
  padding:12px 14px;font-size:12px;color:#ff8080;line-height:1.7}
.err-box strong{display:block;font-size:13px;color:var(--r);margin-bottom:4px}

/* CONTROLS */
.controls{display:flex;gap:8px;padding:12px 16px;
  background:var(--s);border-bottom:1px solid var(--b)}
.btn{flex:1;padding:13px;border-radius:9px;font-size:12px;font-weight:700;
  font-family:monospace;letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;
  justify-content:center;gap:6px;border:1px solid var(--b)}
.btn:active{transform:scale(.96)}
.btn-go{background:var(--g);color:#000;border-color:var(--g)}
.btn-stop{background:transparent;color:var(--t)}
.btn-torch{flex:0;padding:13px 15px;background:transparent;
  color:var(--a);border-color:rgba(255,171,64,.3);display:none}

/* MANUAL */
.manual{display:flex;gap:8px;padding:12px 16px;
  background:var(--s2);border-bottom:1px solid var(--b)}
.manual input{flex:1;background:var(--s);border:1px solid var(--b);
  border-radius:8px;color:var(--t);font-family:monospace;font-size:14px;
  padding:11px 14px;outline:none;transition:border-color .15s}
.manual input:focus{border-color:var(--g);box-shadow:0 0 0 2px rgba(0,230,118,.12)}
.manual input::placeholder{color:var(--m);font-size:12px}
.btn-plus{background:var(--s);border:1px solid var(--g);color:var(--g);
  border-radius:8px;padding:11px 18px;font-size:22px;font-weight:700;cursor:pointer}
.btn-plus:active{background:rgba(0,230,118,.1);transform:scale(.95)}

/* LIST */
.list-hdr{padding:12px 16px 6px;display:flex;align-items:center;justify-content:space-between}
.list-lbl{font-family:monospace;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--m)}
.items{flex:1;overflow-y:auto;padding:0 16px 96px;
  display:flex;flex-direction:column;gap:6px}
.empty{text-align:center;padding:40px 20px;color:var(--m);font-size:13px;line-height:2.2}
.empty-ic{font-size:36px;display:block;opacity:.25;margin-bottom:6px}

.item{background:var(--s);border:1px solid var(--b);border-radius:10px;
  padding:11px 13px;display:flex;align-items:center;gap:10px;
  animation:ini .2s ease-out}
@keyframes ini{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.item.hi{border-color:var(--g);box-shadow:0 0 14px rgba(0,230,118,.2)}
.in{font-family:monospace;font-size:10px;color:var(--m);min-width:22px}
.ii{flex:1;min-width:0}
.ic2{font-family:monospace;font-size:13px;font-weight:700;color:var(--g);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.im{font-size:11px;color:var(--m);margin-top:2px}
.qw{display:flex;align-items:center;gap:5px;background:var(--s2);
  border:1px solid var(--b);border-radius:20px;padding:3px 8px}
.qb{background:none;border:none;color:var(--g);font-size:18px;
  font-weight:700;cursor:pointer;padding:0 3px;line-height:1}
.qv{font-family:monospace;font-size:13px;font-weight:700;
  min-width:22px;text-align:center}
.db{background:none;border:none;color:var(--m);font-size:20px;cursor:pointer;padding:4px}
.db:active{color:var(--r)}

/* BOTTOM */
.bottom{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;
  display:flex;gap:8px;background:var(--s);border-top:1px solid var(--b);z-index:100}
.btn-trash{flex:0;padding:13px 15px;background:transparent;
  color:var(--r);border-color:rgba(255,82,82,.25)}
.btn-trash:active{background:rgba(255,82,82,.1)}
.btn-xl{background:#1a5e36;color:#fff;border-color:#237a46}
.btn-xl:active{background:#144a2a}

#toast{position:fixed;bottom:76px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--g);color:#000;padding:9px 20px;border-radius:20px;
  font-family:monospace;font-size:12px;font-weight:700;
  z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none}
#toast.on{transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--r);color:#fff}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<header>
  <div class="logo">Scan<b>Excel</b></div>
  <div class="badge"><span id="cnt">0</span> items</div>
</header>

<div class="cam-wrap">
  <video id="vid" autoplay playsinline muted></video>
  <div class="cam-overlay" id="overlay">
    <span class="overlay-icon">📷</span>
    <p class="overlay-msg">Pulsa <b>Iniciar cámara</b> para escanear</p>
  </div>
  <div class="frame-guide" id="guide">
    <div class="fb"><div class="c3"></div><div class="c4"></div><div class="sl"></div></div>
  </div>
  <div class="cam-status" id="status" style="display:none"></div>
</div>

<!-- Debug step-by-step -->
<div class="debug" id="debug">
  <div class="step" id="d1">⬜ Buscando cámaras…</div>
  <div class="step" id="d2">⬜ Esperando…</div>
  <div class="step" id="d3">⬜ Esperando…</div>
  <div class="step" id="d4">⬜ Esperando…</div>
</div>

<div class="err-box" id="errBox">
  <strong id="errTitle">Error</strong>
  <span id="errMsg"></span>
</div>

<div class="controls">
  <button class="btn btn-go" id="btnCam" onclick="toggleCam()">▶ Iniciar cámara</button>
  <button class="btn btn-torch" id="btnTorch" onclick="toggleTorch()">🔦</button>
</div>

<div class="manual">
  <input id="manInput" type="text" placeholder="O escribe el código aquí…"
    onkeydown="if(event.key==='Enter')addManual()">
  <button class="btn-plus" onclick="addManual()">+</button>
</div>

<div class="list-hdr"><span class="list-lbl">Códigos escaneados</span></div>
<div class="items" id="itemsList"></div>

<div class="bottom">
  <button class="btn btn-trash" onclick="clearAll()">🗑</button>
  <button class="btn btn-xl" onclick="exportXL()">📊 Exportar Excel</button>
</div>
<div id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────
let items = JSON.parse(localStorage.getItem('sei2') || '[]');
let stream = null, raf = null, active = false;
let lastCode = '', lastTime = 0, torchOn = false;
let detector = null;

(function init() {
  if ('BarcodeDetector' in window) {
    try {
      detector = new BarcodeDetector({
        formats: ['ean_13','ean_8','qr_code','code_128','code_39',
                  'code_93','upc_a','upc_e','codabar','itf','pdf_417','data_matrix']
      });
    } catch(e) { detector = null; }
  }
  render();
})();

// ─── DEBUG HELPERS ───────────────────────────────────────
function dbStep(n, icon, msg, cls) {
  const el = document.getElementById('d' + n);
  if (!el) return;
  el.innerHTML = `<span>${icon}</span> <span class="${cls||''}">${msg}</span>`;
}
function dbOk(n, msg)   { dbStep(n, '✅', msg, 'ok'); }
function dbFail(n, msg) { dbStep(n, '❌', msg, 'fail'); }
function dbWait(n, msg) { dbStep(n, '⏳', msg, 'wait'); }
function showDebug()    { document.getElementById('debug').classList.add('on'); }

// ─── CAMERA ──────────────────────────────────────────────
async function toggleCam() {
  active ? stopCam() : await startCam();
}

async function startCam() {
  hideErr();
  showDebug();
  setStatus('Iniciando…');
  dbWait(1, 'Buscando cámaras del dispositivo…');
  dbStep(2,'⬜','Esperando…'); dbStep(3,'⬜','Esperando…'); dbStep(4,'⬜','Esperando…');

  // PASO 1 — enumerateDevices para encontrar cámara trasera
  let backDeviceId = null;
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cameras = devices.filter(d => d.kind === 'videoinput');
    dbOk(1, `${cameras.length} cámara(s) encontrada(s)`);

    // Buscar trasera por etiqueta
    const back = cameras.find(c =>
      /back|rear|environment|trasera|posterior/i.test(c.label)
    );
    if (back) {
      backDeviceId = back.deviceId;
      dbWait(2, `Cámara trasera: ${back.label.slice(0,30)}…`);
    } else if (cameras.length > 1) {
      // En Samsung suele ser la última de la lista
      backDeviceId = cameras[cameras.length - 1].deviceId;
      dbWait(2, `Usando cámara ${cameras.length} (posible trasera)`);
    } else if (cameras.length === 1) {
      backDeviceId = cameras[0].deviceId;
      dbWait(2, 'Solo una cámara disponible');
    } else {
      dbFail(1, 'No se encontraron cámaras');
      showErr('Sin cámaras', 'El dispositivo no reporta cámaras disponibles.');
      setStatus('');
      return;
    }
  } catch(e) {
    dbFail(1, 'Error enumerando: ' + e.message);
    // Continuar igualmente con facingMode
  }

  // PASO 2 — getUserMedia con las mejores constraints posibles
  dbWait(2, 'Solicitando acceso a cámara…');

  const constraintsList = backDeviceId ? [
    { video: { deviceId: { exact: backDeviceId } } },
    { video: { deviceId: backDeviceId } },
    { video: { facingMode: { exact: 'environment' } } },
    { video: { facingMode: 'environment' } },
    { video: true }
  ] : [
    { video: { facingMode: { exact: 'environment' } } },
    { video: { facingMode: 'environment' } },
    { video: true }
  ];

  let gotStream = null;
  let lastErr   = '';

  for (let i = 0; i < constraintsList.length; i++) {
    try {
      dbWait(2, `Intento ${i+1}/${constraintsList.length}…`);
      gotStream = await navigator.mediaDevices.getUserMedia(constraintsList[i]);
      dbOk(2, `Acceso concedido (intento ${i+1})`);
      break;
    } catch(e) {
      lastErr = e.name + ': ' + e.message;
      if (e.name === 'NotAllowedError') {
        dbFail(2, 'Permiso denegado por el usuario');
        showErr('Permiso denegado',
          'Ve a Ajustes de Chrome → Privacidad y seguridad → Configuración del sitio → Cámara → Permitir para este sitio.');
        setStatus('');
        return;
      }
    }
  }

  if (!gotStream) {
    dbFail(2, 'Todos los intentos fallaron: ' + lastErr);
    showErr('Cámara no disponible', lastErr);
    setStatus('');
    return;
  }

  stream = gotStream;

  // PASO 3 — conectar al elemento <video>
  dbWait(3, 'Conectando al reproductor de vídeo…');
  const vid = document.getElementById('vid');

  vid.srcObject = stream;
  vid.setAttribute('playsinline', '');
  vid.setAttribute('muted', '');
  vid.muted = true;

  // Esperar loadedmetadata con timeout
  const metaOk = await new Promise(resolve => {
    const t = setTimeout(() => resolve(false), 6000);
    vid.onloadedmetadata = () => { clearTimeout(t); resolve(true); };
    vid.onerror = ()     => { clearTimeout(t); resolve(false); };
  });

  if (!metaOk) {
    dbFail(3, 'El vídeo no cargó metadatos (timeout 6s)');
    showErr('Error de vídeo', 'La cámara dio acceso pero el vídeo no pudo iniciarse. Prueba a recargar la página.');
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    setStatus('');
    return;
  }
  dbOk(3, `Vídeo listo: ${vid.videoWidth}×${vid.videoHeight}`);

  // PASO 4 — play()
  dbWait(4, 'Iniciando reproducción…');
  try {
    await vid.play();
    dbOk(4, 'Reproducción activa ✓');
  } catch(e) {
    // En algunos Samsung play() falla, intentar con setAttribute
    vid.setAttribute('autoplay', '');
    try { vid.play(); } catch(e2) {}
    dbStep(4, '⚠️', 'play() con advertencia: ' + e.message, 'wait');
  }

  // Comprobar linterna
  const track = stream.getVideoTracks()[0];
  try {
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.torch) document.getElementById('btnTorch').style.display = 'flex';
  } catch(e) {}

  // UI activa
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('guide').classList.add('on');
  document.getElementById('status').style.display = 'block';
  document.getElementById('btnCam').textContent = '⏹ Detener';
  document.getElementById('btnCam').className = 'btn btn-stop';
  active = true;

  if (detector) {
    setStatus('ESCANEANDO…');
    loopDetect(vid);
  } else {
    setStatus('SIN DETECTOR · ESCRIBE EL CÓDIGO ABAJO');
  }
}

function stopCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  active = false;
  const vid = document.getElementById('vid');
  vid.srcObject = null;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('guide').classList.remove('on');
  document.getElementById('status').style.display = 'none';
  document.getElementById('btnCam').textContent = '▶ Iniciar cámara';
  document.getElementById('btnCam').className = 'btn btn-go';
  document.getElementById('btnTorch').style.display = 'none';
  document.getElementById('debug').classList.remove('on');
  torchOn = false;
}

async function loopDetect(vid) {
  if (!active || !detector) return;
  try {
    if (vid.readyState >= 2 && vid.videoWidth > 0) {
      const codes = await detector.detect(vid);
      if (codes.length) {
        const c = codes[0];
        const now = Date.now();
        if (c.rawValue !== lastCode || now - lastTime > 2000) {
          lastCode = c.rawValue; lastTime = now;
          addCode(c.rawValue, c.format || 'Código');
          flashFx(); beep();
        }
      }
    }
  } catch(e) {}
  raf = requestAnimationFrame(() => loopDetect(vid));
}

async function toggleTorch() {
  if (!stream) return;
  const track = stream.getVideoTracks()[0];
  torchOn = !torchOn;
  try {
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById('btnTorch').textContent = torchOn ? '💡' : '🔦';
  } catch(e) { toast('Linterna no disponible', true); torchOn = false; }
}

// ─── EFFECTS ─────────────────────────────────────────────
function flashFx() {
  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(() => f.classList.remove('on'), 120);
}
function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 900;
    g.gain.setValueAtTime(.25, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .14);
    o.start(); o.stop(ctx.currentTime + .14);
  } catch(e) {}
}

// ─── DATA ─────────────────────────────────────────────────
function addCode(code, type = 'Manual') {
  code = code.trim(); if (!code) return;
  const ex = items.find(i => i.code === code);
  if (ex) { ex.qty++; ex.last = new Date().toISOString(); toast('+1 → ' + code); }
  else items.unshift({ id: Date.now(), code, type, qty: 1,
    first: new Date().toISOString(), last: new Date().toISOString() });
  toast('✓ ' + code); save(); render();
}
function addManual() {
  const el = document.getElementById('manInput');
  if (el.value.trim()) { addCode(el.value.trim(), 'Manual'); el.value = ''; }
}
function changeQty(id, d) {
  const it = items.find(i => i.id === id);
  if (it) { it.qty = Math.max(1, it.qty + d); save(); render(); }
}
function del(id) { items = items.filter(i => i.id !== id); save(); render(); }
function clearAll() {
  if (!items.length) return;
  if (confirm('¿Borrar los ' + items.length + ' códigos?')) {
    items = []; save(); render(); toast('Lista borrada');
  }
}
function save() { localStorage.setItem('sei2', JSON.stringify(items)); }

// ─── RENDER ───────────────────────────────────────────────
function render() {
  document.getElementById('cnt').textContent = items.length;
  const el = document.getElementById('itemsList');
  if (!items.length) {
    el.innerHTML = `<div class="empty"><span class="empty-ic">▤</span>
      Sin códigos aún.<br>Escanea o añade uno manualmente.</div>`;
    return;
  }
  el.innerHTML = items.map((it, i) => {
    const d = new Date(it.last);
    const dt = d.toLocaleDateString('es-ES') + ' ' +
               d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    return `<div class="item" id="i${it.id}">
      <div class="in">#${String(i+1).padStart(2,'0')}</div>
      <div class="ii">
        <div class="ic2">${esc(it.code)}</div>
        <div class="im">${it.type} · ${dt}</div>
      </div>
      <div class="qw">
        <button class="qb" onclick="changeQty(${it.id},-1)">−</button>
        <span class="qv">${it.qty}</span>
        <button class="qb" onclick="changeQty(${it.id},+1)">+</button>
      </div>
      <button class="db" onclick="del(${it.id})">×</button>
    </div>`;
  }).join('');
  const f = document.getElementById('i' + items[0].id);
  if (f) { f.classList.add('hi'); setTimeout(() => f.classList.remove('hi'), 900); }
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── EXPORT ───────────────────────────────────────────────
function exportXL() {
  if (!items.length) { toast('No hay datos', true); return; }
  const e = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fd = iso => { const d = new Date(iso);
    return d.toLocaleDateString('es-ES') + ' ' +
           d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); };
  const hdr = `<Row>
    <Cell ss:StyleID="h"><Data ss:Type="String">Nº</Data></Cell>
    <Cell ss:StyleID="h"><Data ss:Type="String">Código</Data></Cell>
    <Cell ss:StyleID="h"><Data ss:Type="String">Tipo</Data></Cell>
    <Cell ss:StyleID="h"><Data ss:Type="String">Cantidad</Data></Cell>
    <Cell ss:StyleID="h"><Data ss:Type="String">Primera lectura</Data></Cell>
    <Cell ss:StyleID="h"><Data ss:Type="String">Última lectura</Data></Cell></Row>`;
  const rows = items.map((it,i) => `<Row>
    <Cell><Data ss:Type="Number">${i+1}</Data></Cell>
    <Cell><Data ss:Type="String">${e(it.code)}</Data></Cell>
    <Cell><Data ss:Type="String">${e(it.type)}</Data></Cell>
    <Cell><Data ss:Type="Number">${it.qty}</Data></Cell>
    <Cell><Data ss:Type="String">${fd(it.first)}</Data></Cell>
    <Cell><Data ss:Type="String">${fd(it.last)}</Data></Cell></Row>`).join('');
  const tot = `<Row>
    <Cell><Data ss:Type="String"></Data></Cell>
    <Cell ss:StyleID="h"><Data ss:Type="String">TOTAL</Data></Cell>
    <Cell><Data ss:Type="String"></Data></Cell>
    <Cell ss:StyleID="h"><Data ss:Type="Number">${items.reduce((a,i)=>a+i.qty,0)}</Data></Cell></Row>`;
  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
  <Styles><Style ss:ID="h"><Font ss:Bold="1" ss:Color="#FFFFFF"/>
    <Interior ss:Color="#1a5e36" ss:Pattern="Solid"/></Style></Styles>
  <Worksheet ss:Name="Escaneos"><Table>
    <Column ss:Width="30"/><Column ss:Width="200"/>
    <Column ss:Width="100"/><Column ss:Width="70"/>
    <Column ss:Width="130"/><Column ss:Width="130"/>
    ${hdr}${rows}${tot}
  </Table></Worksheet></Workbook>`;
  const blob = new Blob([xml],{type:'application/vnd.ms-excel;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `escaneos_${new Date().toLocaleDateString('es-ES').replace(/\//g,'-')}.xls`;
  a.click(); URL.revokeObjectURL(url);
  toast(`✓ Exportado (${items.length} códigos)`);
}

// ─── UI HELPERS ───────────────────────────────────────────
function setStatus(txt) {
  const s = document.getElementById('status');
  s.style.display = txt ? 'block' : 'none';
  s.textContent = txt;
}
function showErr(title, msg) {
  document.getElementById('errTitle').textContent = title;
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errBox').style.display = 'block';
}
function hideErr() { document.getElementById('errBox').style.display = 'none'; }
let _tt;
function toast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'on' + (err ? ' err' : '');
  clearTimeout(_tt); _tt = setTimeout(() => t.className = '', 2200);
}
</script>
