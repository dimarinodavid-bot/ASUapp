<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Módulo 07 — Dashboard DCS | ASU Venezuela 15TPD</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22223a;
  --orange:#ff6b1a;--orange-dim:#ff6b1a22;--orange-mid:#ff6b1a66;
  --green:#22c55e;--green-dim:#22c55e18;--green-mid:#22c55e66;
  --red:#ef4444;--red-dim:#ef444418;--red-mid:#ef444466;
  --yellow:#f59e0b;--yellow-dim:#f59e0b18;--yellow-mid:#f59e0b66;
  --blue:#3b82f6;--blue-dim:#3b82f618;
  --text:#e8e8f0;--text-dim:#8888aa;--border:#2a2a3f;
  --font-d:'Barlow Condensed',sans-serif;
  --font-b:'Barlow',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;
  display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.hdr-back{width:40px;height:40px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;font-size:18px;color:var(--text-dim);}
.hdr-back:active{background:var(--bg4);}
.hdr-info{flex:1;min-width:0;}
.hdr-tag{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--orange);margin-bottom:2px;}
.hdr-title{font-family:var(--font-d);font-size:18px;font-weight:800;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.scroll-body{flex:1;overflow-y:auto;padding-bottom:32px;}

/* HOME */
.home-hero{background:linear-gradient(180deg,#150a00 0%,var(--bg) 100%);
  padding:24px 16px 16px;}
.home-badge{display:inline-flex;align-items:center;gap:8px;
  background:var(--orange-dim);border:1px solid var(--orange-mid);
  border-radius:8px;padding:6px 12px;margin-bottom:16px;}
.home-badge-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);}
.home-badge-txt{font-family:var(--font-d);font-size:12px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--orange);}
.home-title{font-family:var(--font-d);font-size:36px;font-weight:800;line-height:1;margin-bottom:6px;}
.home-sub{color:var(--text-dim);font-size:14px;margin-bottom:20px;}

/* TURNO SELECTOR */
.turno-wrap{margin:0 16px 16px;}
.turno-label{font-family:var(--font-d);font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
.turno-row{display:flex;gap:8px;}
.turno-btn{flex:1;padding:12px 8px;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;font-family:var(--font-d);font-size:16px;font-weight:800;
  cursor:pointer;text-align:center;color:var(--text-dim);}
.turno-btn.active{background:var(--orange-dim);border-color:var(--orange);color:var(--orange);}
.turno-btn:active{opacity:.8;}
.turno-date{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;width:100%;font-family:var(--font-d);font-size:16px;font-weight:700;
  color:var(--text);outline:none;margin-top:8px;-webkit-appearance:none;}

/* SUMMARY BAR */
.summary-bar{margin:0 16px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.summary-chip{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:10px;text-align:center;}
.summary-val{font-family:var(--font-d);font-size:24px;font-weight:800;}
.summary-lbl{font-size:10px;color:var(--text-dim);margin-top:2px;}

/* SECTION */
.section-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px 6px;cursor:pointer;}
.section-hdr:active{opacity:.8;}
.section-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;}
.section-name{font-family:var(--font-d);font-size:16px;font-weight:800;flex:1;}
.section-status{font-family:var(--font-d);font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:6px;letter-spacing:1px;}
.section-arr{font-size:14px;color:var(--text-dim);transition:transform .2s;}
.section-hdr.collapsed .section-arr{transform:rotate(-90deg);}
.section-body{padding:0 16px 8px;}

/* PARAM ROW */
.param-row{background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;overflow:hidden;}
.param-top{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.param-lamp{width:14px;height:14px;border-radius:50%;flex-shrink:0;
  transition:background .3s;border:2px solid transparent;}
.param-lamp.green{background:var(--green);border-color:var(--green-mid);
  box-shadow:0 0 8px var(--green);}
.param-lamp.yellow{background:var(--yellow);border-color:var(--yellow-mid);
  box-shadow:0 0 8px var(--yellow);animation:blink .8s infinite;}
.param-lamp.red{background:var(--red);border-color:var(--red-mid);
  box-shadow:0 0 10px var(--red);animation:blink .5s infinite;}
.param-lamp.gray{background:var(--bg4);border-color:var(--border);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.param-info{flex:1;min-width:0;}
.param-tag{font-family:var(--font-d);font-size:13px;font-weight:800;margin-bottom:1px;}
.param-desc{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.param-value-wrap{display:flex;align-items:center;gap:6px;}
.param-value{font-family:var(--font-d);font-size:22px;font-weight:800;
  color:var(--text-dim);min-width:70px;text-align:right;}
.param-value.entered{color:var(--text);}
.param-value.green-v{color:var(--green);}
.param-value.yellow-v{color:var(--yellow);}
.param-value.red-v{color:var(--red);}
.param-unit{font-family:var(--font-d);font-size:11px;color:var(--text-dim);flex-shrink:0;}

/* INPUT AREA */
.param-input-area{padding:0 12px 12px;display:flex;gap:8px;align-items:center;}
.param-input{flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;font-family:var(--font-d);font-size:18px;
  font-weight:700;color:var(--text);outline:none;}
.param-input:focus{border-color:var(--orange);}
.param-input.g-border{border-color:var(--green);}
.param-input.y-border{border-color:var(--yellow);}
.param-input.r-border{border-color:var(--red);}
.param-ok-btn{padding:10px 14px;background:var(--orange);color:#000;border:none;
  border-radius:8px;font-family:var(--font-d);font-size:14px;font-weight:800;
  cursor:pointer;flex-shrink:0;}
.param-ok-btn:active{opacity:.85;}
.param-ranges{padding:0 12px 8px;display:flex;gap:6px;flex-wrap:wrap;}
.range-chip{border-radius:4px;padding:2px 8px;font-family:var(--font-d);
  font-size:10px;font-weight:700;letter-spacing:1px;}
.rc-g{background:var(--green-dim);color:var(--green);border:1px solid var(--green-mid);}
.rc-y{background:var(--yellow-dim);color:var(--yellow);border:1px solid var(--yellow-mid);}
.rc-r{background:var(--red-dim);color:var(--red);border:1px solid var(--red-mid);}

/* HISTORY */
.history-entry{margin:0 16px 10px;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;}
.history-entry-hdr{background:var(--bg3);padding:10px 14px;display:flex;
  justify-content:space-between;align-items:center;}
.history-turno{font-family:var(--font-d);font-size:14px;font-weight:800;}
.history-date{font-size:11px;color:var(--text-dim);}
.history-body{padding:10px 14px;}
.history-param-row{display:flex;justify-content:space-between;padding:4px 0;
  border-bottom:1px solid var(--border);font-size:12px;}
.history-param-row:last-child{border-bottom:none;}
.history-tag{color:var(--text-dim);font-family:var(--font-d);font-size:12px;font-weight:700;}
.history-val{font-family:var(--font-d);font-size:13px;font-weight:800;}

/* ACTIONS */
.action-row{padding:0 16px;display:flex;gap:8px;margin-bottom:12px;}
.act-btn{flex:1;padding:14px 8px;border-radius:10px;border:none;cursor:pointer;
  font-family:var(--font-d);font-size:15px;font-weight:800;letter-spacing:1px;}
.act-btn.primary{background:var(--orange);color:#000;}
.act-btn.secondary{background:var(--bg3);color:var(--text-dim);border:1px solid var(--border);}
.act-btn:active{opacity:.85;}
.spacer{height:16px;}

/* ALARM BANNER */
.alarm-banner{margin:0 16px 12px;padding:12px 14px;border-radius:10px;
  display:flex;align-items:center;gap:10px;display:none;}
.alarm-banner.visible{display:flex;}
.alarm-banner.alarm{background:var(--yellow-dim);border:1px solid var(--yellow-mid);}
.alarm-banner.trip{background:var(--red-dim);border:1px solid var(--red-mid);}
.alarm-banner-icon{font-size:20px;flex-shrink:0;}
.alarm-banner-text{font-size:13px;font-weight:600;line-height:1.4;}
.alarm-banner.alarm .alarm-banner-text{color:var(--yellow);}
.alarm-banner.trip .alarm-banner-text{color:var(--red);}
</style>
</head>
<body>

<!-- HOME / DASHBOARD -->
<div id="s-home" class="screen active">
  <div class="hdr">
    <div class="hdr-info">
      <div class="hdr-tag">Módulo 07 · ASU Venezuela 15TPD</div>
      <div class="hdr-title">Dashboard de Parámetros DCS</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <div style="width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);
        border-radius:8px;display:flex;align-items:center;justify-content:center;
        cursor:pointer;font-size:16px;" onclick="go('s-history')">📋</div>
      <div style="width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);
        border-radius:8px;display:flex;align-items:center;justify-content:center;
        cursor:pointer;font-size:16px;" onclick="clearAll()">🗑️</div>
    </div>
  </div>
  <div class="scroll-body" id="home-scroll">

    <!-- TURNO -->
    <div style="padding:16px 16px 0;">
      <div class="turno-label">Turno activo</div>
      <div class="turno-row">
        <div class="turno-btn" id="t-A" onclick="setTurno('A')">TURNO A</div>
        <div class="turno-btn" id="t-B" onclick="setTurno('B')">TURNO B</div>
        <div class="turno-btn" id="t-C" onclick="setTurno('C')">TURNO C</div>
      </div>
      <input type="datetime-local" class="turno-date" id="turno-date">
    </div>

    <!-- ALARM BANNER -->
    <div style="height:12px;"></div>
    <div class="alarm-banner" id="alarm-banner">
      <span class="alarm-banner-icon">⚠️</span>
      <span class="alarm-banner-text" id="alarm-banner-text"></span>
    </div>

    <!-- SUMMARY -->
    <div class="summary-bar">
      <div class="summary-chip">
        <div class="summary-val green-v" id="sum-ok">—</div>
        <div class="summary-lbl">✓ Normal</div>
      </div>
      <div class="summary-chip">
        <div class="summary-val" style="color:var(--yellow)" id="sum-alarm">—</div>
        <div class="summary-lbl">⚠ Alarma</div>
      </div>
      <div class="summary-chip">
        <div class="summary-val" style="color:var(--red)" id="sum-trip">—</div>
        <div class="summary-lbl">🔴 Trip</div>
      </div>
    </div>

    <!-- PARAMETER SECTIONS injected by JS -->
    <div id="params-wrap"></div>

    <!-- SAVE BUTTON -->
    <div class="action-row">
      <button class="act-btn primary" onclick="saveShift()">💾 Guardar Turno</button>
      <button class="act-btn secondary" onclick="go('s-history')">📋 Historial</button>
    </div>

    <div class="spacer"></div>
  </div>
</div>

<!-- HISTORIAL -->
<div id="s-history" class="screen">
  <div class="hdr">
    <div class="hdr-back" onclick="go('s-home')">‹</div>
    <div class="hdr-info">
      <div class="hdr-tag">Módulo 07</div>
      <div class="hdr-title">Historial de Turnos</div>
    </div>
  </div>
  <div class="scroll-body" id="history-scroll">
    <div style="padding:16px 16px 8px;font-family:var(--font-d);font-size:11px;
      letter-spacing:2px;text-transform:uppercase;color:var(--orange);">
      REGISTROS GUARDADOS
    </div>
    <div id="history-wrap"></div>
    <div style="padding:8px 16px;">
      <button class="act-btn secondary" onclick="clearHistory()" style="width:100%;">
        🗑️ Borrar todo el historial
      </button>
    </div>
    <div class="spacer"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// PARAMETER DEFINITIONS — K391y.00000YK
// normal: [min, max] for green
// alarm: value that triggers yellow
// trip: value that triggers red
// dir: 'high' = alarm if > alarm, 'low' = alarm if < alarm, 'range' = normal between min/max
// ═══════════════════════════════════════
const SECTIONS = [
  {
    id:'ac', name:'AC1001 — Compresor', icon:'⚙️', color:'#ff6b1a',
    params:[
      {id:'PdIA1001', tag:'PdIA-1001', desc:'ΔP Filtro AF1001', unit:'Pa', normal:[150,650], alarm:650, trip:null, dir:'high', hint:'Normal: 150~650 Pa · Alarma: >650 Pa'},
      {id:'TIA1101',  tag:'TIA-1101',  desc:'T° entrada RU1101', unit:'°C', normal:[0,41], alarm:45, trip:null, dir:'high', hint:'Normal: ≤41°C (106°F) · Alarma: 45°C (113°F)'},
      {id:'TIA1102',  tag:'TIA-1102',  desc:'T° salida RU1101',  unit:'°C', normal:[-5,10], alarm:14, trip:null, dir:'high', hint:'Normal: <10°C (50°F) · Alarma: 14°C (57°F)'},
      {id:'PIA101',   tag:'PIA-101',   desc:'P° entrada Cold Box', unit:'MPa', normal:[0.95,0.985], alarm:0.95, trip:null, dir:'low', hint:'Normal: ~0.985 MPa · Alarma baja: 0.95 MPa (138 PSI)'},
    ]
  },
  {
    id:'ppu', name:'PPU1201 — Purificación', icon:'🧪', color:'#a855f7',
    params:[
      {id:'FIAS1201',  tag:'FIAS-1201',  desc:'Flujo gas regeneración', unit:'Nm³/h', normal:[1400,2500], alarm:1200, trip:900, dir:'low', hint:'Normal: >1400 · Alarma: <1200 · SLL: <900 Nm³/h'},
      {id:'TIAS1205',  tag:'TIAS-1205',  desc:'T° salida calentador EH1201', unit:'°C', normal:[160,180], alarm:190, trip:null, dir:'high', hint:'SP: 170°C (338°F) · Alarma: 160°C bajo / 190°C alto'},
      {id:'TIAS1206',  tag:'TIAS-1206',  desc:'T° cámara EH1201', unit:'°C', normal:[0,200], alarm:220, trip:240, dir:'high', hint:'Normal: <200°C · Alarma: 220°C (428°F) · Trip: 240°C (464°F)'},
      {id:'AIA1201',   tag:'AIA-1201',   desc:'CO₂ en aire purificado', unit:'ppm', normal:[0,1], alarm:1, trip:null, dir:'high', hint:'Normal: <1 ppm · Alarma: ≥1 ppm'},
      {id:'AIA1202',   tag:'AIA-1202',   desc:'Punto de rocío aire', unit:'°C', normal:[-100,-65], alarm:-65, trip:null, dir:'high', hint:'Normal: <-65°C (-85°F) · Alarma: ≥-65°C'},
    ]
  },
  {
    id:'et', name:'ET401 — Expansor', icon:'💨', color:'#14b8a6',
    params:[
      {id:'SIAS401',  tag:'SIAS-401',  desc:'Velocidad expansor', unit:'RPM', normal:[40000,47499], alarm:47500, trip:50500, dir:'high', hint:'Normal: ~44,100 RPM · Alarma: 47,500 · Trip: 50,500'},
      {id:'PIAS406',  tag:'PIAS-406',  desc:'P° aceite cojinetes', unit:'MPa', normal:[0.5,0.6], alarm:0.6, trip:0.5, dir:'low', hint:'Normal: 0.5~0.6 MPa (73~87 PSI) · Alarma: <0.6 · Trip: <0.5'},
      {id:'TIAS403',  tag:'TIAS-403',  desc:'T° cojinete expansor', unit:'°C', normal:[0,70], alarm:70, trip:75, dir:'high', hint:'Normal: <70°C (158°F) · Alarma: 70°C · Trip: 75°C (167°F)'},
      {id:'TIAS404',  tag:'TIAS-404',  desc:'T° cojinete booster', unit:'°C', normal:[0,70], alarm:70, trip:75, dir:'high', hint:'Normal: <70°C (158°F) · Alarma: 70°C · Trip: 75°C (167°F)'},
      {id:'FICS401',  tag:'FICS-401',  desc:'Flujo booster', unit:'Nm³/h', normal:[2600,4500], alarm:2600, trip:null, dir:'low', hint:'Normal: ~4,000 Nm³/h · Alarma: <2,600 (anti-surge activa)'},
      {id:'PIAS407',  tag:'PIAS-407',  desc:'P° sello gas expansor', unit:'MPa', normal:[0.43,1.5], alarm:0.43, trip:0.25, dir:'low', hint:'Normal: 0.49 MPa (71 PSI) · Alarma: <0.43 · Trip: <0.25 MPa'},
    ]
  },
  {
    id:'cb', name:'Cold Box — C1/C2/K1', icon:'🏛️', color:'#0ea5e9',
    params:[
      {id:'TI1',      tag:'TI-1',     desc:'T° aire entrada C1', unit:'°C', normal:[-170,-155], alarm:null, trip:null, dir:'range', hint:'Diseño: -165°C (-265°F) · Rango normal: -155 a -170°C'},
      {id:'PIA1',     tag:'PIA-1',    desc:'P° columna C1 (HP)', unit:'MPa', normal:[0.44,0.52], alarm:0.44, trip:null, dir:'low', hint:'Normal: 0.48 MPa (70 PSI) · Alarma baja: 0.44 MPa (64 PSI)'},
      {id:'PIA2',     tag:'PIA-2',    desc:'P° columna C2 (LP)', unit:'MPa', normal:[0.038,0.052], alarm:0.052, trip:null, dir:'high', hint:'Normal: 0.045 MPa (6.5 PSI) · Alarma alta: 0.052 MPa (7.5 PSI)'},
      {id:'PdIA1',    tag:'PdIA-1',   desc:'ΔP columna C1', unit:'MPa', normal:[0,0.022], alarm:0.022, trip:null, dir:'high', hint:'Normal: ~0.015 MPa · Alarma: >0.022 MPa'},
      {id:'PdIA2',    tag:'PdIA-2',   desc:'ΔP columna C2', unit:'MPa', normal:[0,0.025], alarm:0.025, trip:null, dir:'high', hint:'Normal: ~0.015 MPa · Alarma: >0.025 MPa'},
      {id:'LICA1',    tag:'LICA-1',   desc:'Nivel líquido C1', unit:'mm', normal:[650,1000], alarm:1000, trip:null, dir:'range', hint:'Rango transmisor LT-1: 0~1,392 mm · Diseño: 840 mm · AL: 650 mm · AH: 1,000 mm'},
      {id:'LICAS2',   tag:'LICAS-2',  desc:'Nivel LOX K1', unit:'mm', normal:[1100,1350], alarm:1350, trip:950, dir:'range', hint:'Rango transmisor LT-2: 0~1,480 mm · Diseño: 1,230 mm · SLL: 950 · AL: 1,100 · SHH: 1,350 mm'},
      {id:'AIAS2',    tag:'AIAS-2',   desc:'Pureza LOX', unit:'%O₂', normal:[99.6,100], alarm:99.5, trip:null, dir:'low', hint:'Normal: ≥99.6% O₂ · Alarma: <99.5% O₂'},
      {id:'AIAS3',    tag:'AIAS-3',   desc:'Pureza LIN (O₂ en N₂)', unit:'ppm', normal:[0,10], alarm:9, trip:null, dir:'high', hint:'Normal: ≤10 ppm O₂ · Alarma: >9 ppm O₂'},
    ]
  },
  {
    id:'tanks', name:'Tanques — SV1701 / SV1801', icon:'🛢️', color:'#22c55e',
    params:[
      {id:'LIAS1701', tag:'LIAS-1701', desc:'Nivel LOX — SV1701', unit:'mm', normal:[1000,2350], alarm:1000, trip:500, dir:'low', hint:'Rango LT-1701: 0~2,700 mm · Normal: >1,000 · AL: 1,000 · SLL: 500 · SHH: 2,350 · Máx transmisor: 2,428 mm'},
      {id:'LIAS1801', tag:'LIAS-1801', desc:'Nivel LIN — SV1801', unit:'mm', normal:[1000,2350], alarm:1000, trip:500, dir:'low', hint:'Rango LT-1801: 0~4,500 mm · Normal: >1,000 · AL: 1,000 · SLL: 500 · SHH: 2,350 · Máx transmisor: 4,081 mm'},
      {id:'PIA1701',  tag:'PIA-1701',  desc:'P° tanque LOX SV1701', unit:'MPa', normal:[0.04,0.8], alarm:0.81, trip:null, dir:'high', hint:'Normal: ≤0.8 MPa (116 PSI) · Alarma: 0.81 MPa'},
      {id:'PIA1801',  tag:'PIA-1801',  desc:'P° tanque LIN SV1801', unit:'MPa', normal:[0.04,0.8], alarm:0.81, trip:null, dir:'high', hint:'Normal: ≤0.8 MPa (116 PSI) · Alarma: 0.81 MPa'},
    ]
  },
  {
    id:'water', name:'Agua de Enfriamiento', icon:'💧', color:'#60a5fa',
    params:[
      {id:'TIA5001', tag:'TIA-5001', desc:'T° agua suministro usuario', unit:'°C', normal:[20,32], alarm:32, trip:null, dir:'high', hint:'Normal: 28°C (82°F) · Alarma: >32°C (90°F)'},
      {id:'PIA5001', tag:'PIA-5001', desc:'P° agua suministro', unit:'MPa', normal:[0.28,0.4], alarm:0.28, trip:null, dir:'low', hint:'Normal: 0.35 MPa (51 PSI) · Alarma baja: 0.28 MPa (41 PSI)'},
    ]
  },
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const KEY = 'asu_m07';
let state = JSON.parse(localStorage.getItem(KEY)||'{}');
if(!state.turno) state.turno = 'A';
if(!state.values) state.values = {};
if(!state.history) state.history = [];
let collapsedSections = state.collapsed||{};

function saveLS(){ localStorage.setItem(KEY, JSON.stringify(state)); }

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='s-home') renderDashboard();
  if(id==='s-history') renderHistory();
}

// ═══════════════════════════════════════
// TURNO
// ═══════════════════════════════════════
function setTurno(t){
  state.turno = t;
  saveLS();
  document.querySelectorAll('.turno-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('t-'+t).classList.add('active');
}

function initTurnoUI(){
  document.querySelectorAll('.turno-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('t-'+state.turno);
  if(btn) btn.classList.add('active');
  // Set date to now if not set
  const d = document.getElementById('turno-date');
  const now = new Date();
  const pad = n=>String(n).padStart(2,'0');
  d.value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

// ═══════════════════════════════════════
// STATUS LOGIC
// ═══════════════════════════════════════
function getStatus(param, val){
  if(val === undefined || val === null || val === '') return 'gray';
  const v = parseFloat(val);
  if(isNaN(v)) return 'gray';

  if(param.dir === 'high'){
    if(param.trip !== null && v >= param.trip) return 'red';
    if(param.alarm !== null && v >= param.alarm) return 'yellow';
    if(v >= param.normal[0] && v <= param.normal[1]) return 'green';
    return 'green';
  }
  if(param.dir === 'low'){
    if(param.trip !== null && v <= param.trip) return 'red';
    if(param.alarm !== null && v <= param.alarm) return 'yellow';
    return 'green';
  }
  if(param.dir === 'range'){
    if(v >= param.normal[0] && v <= param.normal[1]) return 'green';
    return 'yellow';
  }
  return 'gray';
}

function getStatusLabel(s){
  if(s==='green') return 'NORMAL';
  if(s==='yellow') return 'ALARMA';
  if(s==='red') return 'TRIP';
  return '—';
}

// ═══════════════════════════════════════
// RENDER DASHBOARD
// ═══════════════════════════════════════
function renderDashboard(){
  initTurnoUI();

  let totalGreen=0, totalYellow=0, totalRed=0;
  const alarmList=[];

  const wrap = document.getElementById('params-wrap');
  wrap.innerHTML = '';

  SECTIONS.forEach(sec=>{
    let secGreen=0, secYellow=0, secRed=0;

    // Calculate section stats
    sec.params.forEach(p=>{
      const v = state.values[p.id];
      const s = getStatus(p, v);
      if(s==='green') secGreen++;
      else if(s==='yellow'){ secYellow++; totalYellow++; alarmList.push({tag:p.tag,desc:p.desc,v,s:'yellow'}); }
      else if(s==='red'){ secRed++; totalRed++; alarmList.push({tag:p.tag,desc:p.desc,v,s:'red'}); }
      else secGreen++;
    });
    totalGreen += secGreen;

    const secStatus = secRed>0?'red':secYellow>0?'yellow':'green';
    const isCollapsed = collapsedSections[sec.id] || false;

    const secDiv = document.createElement('div');

    const statusBg = secStatus==='red'?'var(--red-dim)':secStatus==='yellow'?'var(--yellow-dim)':'var(--green-dim)';
    const statusColor = secStatus==='red'?'var(--red)':secStatus==='yellow'?'var(--yellow)':'var(--green)';
    const statusLabel = secStatus==='red'?`${secRed} TRIP`:secStatus==='yellow'?`${secYellow} ALARMA`:'OK';

    const paramHtml = sec.params.map(p=>{
      const val = state.values[p.id];
      const status = getStatus(p, val);
      const hasVal = val !== undefined && val !== null && val !== '';
      const dispVal = hasVal ? val : '—';
      const valClass = !hasVal?'':status==='green'?'green-v':status==='yellow'?'yellow-v':'red-v';
      const borderClass = !hasVal?'':status==='green'?'g-border':status==='yellow'?'y-border':'r-border';

      return `<div class="param-row">
        <div class="param-top">
          <div class="param-lamp ${status}" title="${getStatusLabel(status)}"></div>
          <div class="param-info">
            <div class="param-tag">${p.tag}</div>
            <div class="param-desc">${p.desc}</div>
          </div>
          <div class="param-value-wrap">
            <div class="param-value ${hasVal?'entered':''} ${valClass}">${dispVal}</div>
            <div class="param-unit">${p.unit}</div>
          </div>
        </div>
        <div class="param-ranges">
          <span class="range-chip rc-g">✓ ${p.normal[0]}~${p.normal[1]}</span>
          ${p.alarm!==null?`<span class="range-chip rc-y">⚠ ${p.hint.includes('>')?'>':'<'}${p.alarm}</span>`:''}
          ${p.trip!==null?`<span class="range-chip rc-r">🔴 ${p.hint.includes('>')?'>':'<'}${p.trip}</span>`:''}
        </div>
        <div class="param-input-area">
          <input type="number" class="param-input ${borderClass}" id="inp-${p.id}"
            placeholder="${p.hint}" value="${hasVal?val:''}" inputmode="decimal" step="any"
            onchange="updateValue('${p.id}','${sec.id}',this.value)">
          <button class="param-ok-btn" onclick="confirmValue('${p.id}','${sec.id}')">✓</button>
        </div>
      </div>`;
    }).join('');

    secDiv.innerHTML = `
      <div class="section-hdr ${isCollapsed?'collapsed':''}" id="sec-hdr-${sec.id}" onclick="toggleSection('${sec.id}')">
        <div class="section-icon" style="background:${sec.color}22;font-size:18px;">${sec.icon}</div>
        <div class="section-name">${sec.name}</div>
        <div class="section-status" style="background:${statusBg};color:${statusColor};">${statusLabel}</div>
        <div class="section-arr">▾</div>
      </div>
      <div class="section-body" id="sec-body-${sec.id}" style="display:${isCollapsed?'none':'block'};">
        ${paramHtml}
      </div>`;
    wrap.appendChild(secDiv);
  });

  // Update summary
  document.getElementById('sum-ok').textContent = totalGreen;
  document.getElementById('sum-alarm').textContent = totalYellow;
  document.getElementById('sum-trip').textContent = totalRed;

  // Alarm banner
  const banner = document.getElementById('alarm-banner');
  const bannerText = document.getElementById('alarm-banner-text');
  if(totalRed > 0){
    banner.className = 'alarm-banner visible trip';
    const trips = alarmList.filter(a=>a.s==='red');
    bannerText.textContent = `🔴 TRIP: ${trips.map(t=>t.tag).join(' · ')} — Verificar inmediatamente`;
  } else if(totalYellow > 0){
    banner.className = 'alarm-banner visible alarm';
    const alarms = alarmList.filter(a=>a.s==='yellow');
    bannerText.textContent = `⚠️ ALARMA: ${alarms.map(a=>a.tag).join(' · ')}`;
  } else {
    banner.className = 'alarm-banner';
  }
}

function toggleSection(id){
  collapsedSections[id] = !collapsedSections[id];
  state.collapsed = collapsedSections;
  saveLS();
  const body = document.getElementById('sec-body-'+id);
  const hdr = document.getElementById('sec-hdr-'+id);
  body.style.display = collapsedSections[id]?'none':'block';
  hdr.classList.toggle('collapsed', collapsedSections[id]);
}

function updateValue(paramId, secId, val){
  if(val === '') { delete state.values[paramId]; }
  else { state.values[paramId] = parseFloat(val); }
  saveLS();
  // Update lamp and value display only (no full re-render to keep focus)
  const param = findParam(paramId);
  if(!param) return;
  const status = getStatus(param, state.values[paramId]);
  // Update lamp
  const lamp = document.querySelector(`#inp-${paramId}`)?.closest('.param-row')?.querySelector('.param-lamp');
  if(lamp){ lamp.className = 'param-lamp '+status; }
  // Update input border
  const inp = document.getElementById('inp-'+paramId);
  if(inp){ inp.className = `param-input ${val?status[0]+'-border':''}`; }
  // Update summary
  recalcSummary();
}

function confirmValue(paramId, secId){
  const inp = document.getElementById('inp-'+paramId);
  if(inp) updateValue(paramId, secId, inp.value);
  renderDashboard();
}

function findParam(id){
  for(const sec of SECTIONS){
    for(const p of sec.params){
      if(p.id===id) return p;
    }
  }
  return null;
}

function recalcSummary(){
  let g=0,y=0,r=0;
  SECTIONS.forEach(sec=>{
    sec.params.forEach(p=>{
      const s=getStatus(p,state.values[p.id]);
      if(s==='green')g++;else if(s==='yellow')y++;else if(s==='red')r++;else g++;
    });
  });
  document.getElementById('sum-ok').textContent=g;
  document.getElementById('sum-alarm').textContent=y;
  document.getElementById('sum-trip').textContent=r;
}

// ═══════════════════════════════════════
// SAVE / HISTORY
// ═══════════════════════════════════════
function saveShift(){
  const dateEl = document.getElementById('turno-date');
  const entry = {
    id: Date.now(),
    turno: state.turno,
    date: dateEl ? dateEl.value : new Date().toISOString(),
    values: {...state.values},
    stats: calcStats()
  };
  state.history.unshift(entry);
  if(state.history.length > 30) state.history = state.history.slice(0,30);
  saveLS();

  // Show confirmation
  const btn = document.querySelector('.act-btn.primary');
  if(btn){ btn.textContent='✓ Guardado'; setTimeout(()=>{ btn.textContent='💾 Guardar Turno'; },2000); }
}

function calcStats(){
  let g=0,y=0,r=0;
  SECTIONS.forEach(sec=>{
    sec.params.forEach(p=>{
      const s=getStatus(p,state.values[p.id]);
      if(s==='green'||s==='gray')g++;else if(s==='yellow')y++;else if(s==='red')r++;
    });
  });
  return {green:g,yellow:y,red:r};
}

function clearAll(){
  if(confirm('¿Borrar todos los valores del turno actual?')){
    state.values = {};
    saveLS();
    renderDashboard();
  }
}

// ═══════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════
function renderHistory(){
  const wrap = document.getElementById('history-scroll');
  const listEl = document.getElementById('history-wrap');

  if(!state.history||state.history.length===0){
    listEl.innerHTML=`<div style="padding:32px 16px;text-align:center;color:var(--text-dim);font-size:14px;">
      No hay registros guardados aún.<br>Usa "Guardar Turno" en el dashboard.
    </div>`;
    return;
  }

  listEl.innerHTML = state.history.map(entry=>{
    const d = new Date(entry.date);
    const dateStr = isNaN(d)?entry.date:`${d.toLocaleDateString('es')} ${d.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}`;

    // Show entered values grouped by section
    const paramRows = SECTIONS.flatMap(sec=>
      sec.params
        .filter(p=> entry.values[p.id]!==undefined)
        .map(p=>{
          const v = entry.values[p.id];
          const s = getStatus(p, v);
          const vc = s==='green'?'var(--green)':s==='yellow'?'var(--yellow)':s==='red'?'var(--red)':'var(--text-dim)';
          return `<div class="history-param-row">
            <span class="history-tag">${p.tag}</span>
            <span class="history-val" style="color:${vc}">${v} ${p.unit}</span>
          </div>`;
        })
    ).join('');

    const hasStats = entry.stats;
    return `<div class="history-entry">
      <div class="history-entry-hdr">
        <div>
          <div class="history-turno">TURNO ${entry.turno}</div>
          <div class="history-date">${dateStr}</div>
        </div>
        ${hasStats?`<div style="display:flex;gap:8px;font-family:var(--font-d);font-size:12px;font-weight:800;">
          <span style="color:var(--green)">✓${entry.stats.green}</span>
          <span style="color:var(--yellow)">⚠${entry.stats.yellow}</span>
          <span style="color:var(--red)">🔴${entry.stats.red}</span>
        </div>`:''}
      </div>
      <div class="history-body">
        ${paramRows||'<div style="color:var(--text-dim);font-size:12px;">Sin valores registrados</div>'}
      </div>
    </div>`;
  }).join('');
}

function clearHistory(){
  if(confirm('¿Borrar todo el historial de turnos?')){
    state.history=[];
    saveLS();
    renderHistory();
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderDashboard();
</script>
</body>
</html>
